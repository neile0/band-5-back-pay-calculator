server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression — reduces transfer size, improves Core Web Vitals
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        font/woff2;

    # Flutter bootstrap and app shell — short cache so deploys go live fast
    location ~* \.(html|json)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Versioned JS/CSS/wasm — Flutter appends content hashes, safe to cache long
    location ~* \.(js|css|wasm|ttf|woff|woff2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Images and icons — cache for a week
    location ~* \.(png|svg|ico|jpg|webp)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # robots.txt and sitemap — always fresh
    location ~* \.(txt|xml)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Fallback: SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
