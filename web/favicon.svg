<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#006B7C"/>
      <stop offset="100%" stop-color="#004855"/>
    </linearGradient>
    <linearGradient id="gold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FFD15C"/>
      <stop offset="100%" stop-color="#F5B800"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Stethoscope tubing — white, smooth bezier branches -->
  <!-- Left branch: junction → left ear bend -->
  <path d="M 50 45 C 50 36, 29 35, 27 25"
        stroke="white" stroke-width="5.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right branch: junction → right ear bend -->
  <path d="M 50 45 C 50 36, 71 35, 73 25"
        stroke="white" stroke-width="5.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Stem: junction → chest piece -->
  <line x1="50" y1="45" x2="50" y2="55"
        stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Ear bends — short angled tips -->
  <line x1="27" y1="25" x2="23" y2="21"
        stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="73" y1="25" x2="77" y2="21"
        stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Ear tips — gold accent dots -->
  <circle cx="22" cy="19" r="5.5" fill="url(#gold)"/>
  <circle cx="78" cy="19" r="5.5" fill="url(#gold)"/>

  <!-- Chest piece — large gold circle, the visual anchor -->
  <circle cx="50" cy="73" r="18" fill="url(#gold)"/>
  <!-- Diaphragm ring -->
  <circle cx="50" cy="73" r="11.5" fill="none" stroke="#004855" stroke-width="3"/>
  <!-- Centre dot -->
  <circle cx="50" cy="73" r="3.5" fill="#004855"/>
</svg>
