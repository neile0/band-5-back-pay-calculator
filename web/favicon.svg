<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#006B7C"/>
      <stop offset="100%" stop-color="#004855"/>
    </linearGradient>
    <linearGradient id="gold" x1="15%" y1="5%" x2="85%" y2="95%">
      <stop offset="0%" stop-color="#FFD760"/>
      <stop offset="100%" stop-color="#E8A800"/>
    </linearGradient>
    <linearGradient id="face" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#FFFEF5"/>
      <stop offset="100%" stop-color="#FFF8DC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Tunic body — white, V-neck cut lets teal show through -->
  <path d="M 0 24 Q 24 24 50 46 Q 76 24 100 24 L 100 100 L 0 100 Z"
        fill="white" opacity="0.94"/>

  <!-- Fob watch bow — the loop that clips to the tunic breast -->
  <ellipse cx="50" cy="48.5" rx="5.5" ry="3"
           fill="none" stroke="url(#gold)" stroke-width="3"
           stroke-linecap="round"/>

  <!-- Short stem: bow to watch case -->
  <line x1="50" y1="51.5" x2="50" y2="54"
        stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Watch case (outer) -->
  <circle cx="50" cy="70" r="16.5" fill="url(#gold)"/>

  <!-- Case rim -->
  <circle cx="50" cy="70" r="16.5"
          fill="none" stroke="#C88A00" stroke-width="1.5"/>

  <!-- Watch face -->
  <circle cx="50" cy="70" r="11.5" fill="url(#face)"/>

  <!-- Hour and minute markers at 12, 3, 6, 9 -->
  <line x1="50" y1="59.5" x2="50" y2="61"   stroke="#005C69" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60.5" y1="70" x2="59" y2="70"   stroke="#005C69" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="80.5" x2="50" y2="79"   stroke="#005C69" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39.5" y1="70" x2="41" y2="70"   stroke="#005C69" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Hands at 10:10 — the "open smile" classic watch position -->
  <!-- Hour hand → 10 o'clock -->
  <line x1="50" y1="70" x2="44" y2="64"
        stroke="#004855" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand → 2 o'clock (longer) -->
  <line x1="50" y1="70" x2="57" y2="63.5"
        stroke="#004855" stroke-width="2" stroke-linecap="round"/>

  <!-- Centre pin -->
  <circle cx="50" cy="70" r="1.8" fill="#004855"/>
</svg>
