<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Teal rounded background -->
  <rect width="64" height="64" rx="14" fill="#005C69"/>
  <!-- Stethoscope: ear tubes -->
  <path d="M18 14 C18 14 14 14 14 20 L14 30" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M46 14 C46 14 50 14 50 20 L50 30" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Stethoscope: chest piece curve -->
  <path d="M14 30 Q14 46 32 46 Q50 46 50 30" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Stethoscope: tube to chest piece -->
  <line x1="32" y1="46" x2="32" y2="52" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Chest piece circle -->
  <circle cx="32" cy="55" r="4" fill="white"/>
  <!-- Earpieces -->
  <circle cx="18" cy="13" r="3.5" fill="#FFC837"/>
  <circle cx="46" cy="13" r="3.5" fill="#FFC837"/>
</svg>
